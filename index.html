<!DOCTYPE html>
<html>
<head>
  <title>Detector de Cores</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #00ffcc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #resultado {
      font-size: 24px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Detector de Cores 🎨</h1>
  <p>Mostre vermelho, azul ou verde para a câmera</p>

  <button onclick="init()">Iniciar</button>

  <div id="webcam-container"></div>
  <div id="resultado"></div>

  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/ClAQCeGsW/";

    let model, webcam;

    async function init() {
      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      model = await tmImage.load(modelURL, metadataURL);

      webcam = new tmImage.Webcam(300, 300, true);
      await webcam.setup();
      await webcam.play();

      window.requestAnimationFrame(loop);

      document.getElementById("webcam-container").appendChild(webcam.canvas);
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      let maior = prediction.reduce((prev, current) =>
        (prev.probability > current.probability) ? prev : current
      );

      document.getElementById("resultado").innerHTML =
        "Cor detectada: <strong>" + maior.className + "</strong>";
    }
  </script>

</body>
</html>
